name: Check

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  renovate-config:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Renovate CLI
        run: npm install -g renovate

      - name: Validate Renovate config
        run: renovate-config-validator --strict
